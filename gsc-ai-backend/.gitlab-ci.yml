stages:
  - test
  - build
  - e2e

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"
  DATABASE_URL: "gsc_poc.db"
  OPENAI_MODEL: "gpt-4o"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip/
    - .cache/npm/
    - dashboard/node_modules/

backend_tests:
  stage: test
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - python -c "from mcp_server.database.connection import init_db; init_db(); print('Database initialised')"
    - mkdir -p reports
    - pytest -q tests --junitxml=reports/pytest.xml
  artifacts:
    when: always
    reports:
      junit: reports/pytest.xml
    paths:
      - reports/pytest.xml


dashboard_build:
  stage: build
  image: node:20-alpine
  script:
    - npm --prefix dashboard ci
    - npm --prefix dashboard run build
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - dashboard/dist/


playwright_e2e_manual:
  stage: e2e
  image: mcr.microsoft.com/playwright:v1.54.2-jammy
  needs:
    - backend_tests
    - dashboard_build
  when: manual
  allow_failure: true
  before_script:
    - apt-get update
    - apt-get install -y python3 python3-pip
    - python3 --version
    - pip3 install -r requirements.txt
  script:
    - python3 -c "from mcp_server.database.connection import init_db; init_db(); print('Database initialised')"
    - python3 -m uvicorn orchestrator.main:app --host 0.0.0.0 --port 8000 &
    - sleep 5
    - npx -y @playwright/test@1.54.2 test --config=playwright.config.ts --reporter=line
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - playwright-report/
      - test-results/
